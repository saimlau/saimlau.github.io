<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 100" width="310" height="100">
  <defs>
    <style>
      .stroke { fill: none; stroke: #8C1515; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #8C1515; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #8C1515; }
    </style>
  </defs>

  <!-- S: Steep Hill function sigmoid -->
  <!-- Faint axes -->
  <line x1="8" y1="88" x2="92" y2="88" class="thin" opacity="0.3"/>
  <line x1="8" y1="88" x2="8" y2="8" class="thin" opacity="0.3"/>
  <!-- Steep Hill function sigmoid -->
  <path d="M 12,82 C 20,82 30,82 38,80 C 43,78 46,70 48,50 C 50,30 52,22 57,18 C 62,14 70,12 88,12" class="stroke" stroke-width="4.5"/>
  <!-- Data scatter points -->
  <circle cx="18" cy="81" r="2" class="dot" opacity="0.5"/>
  <circle cx="30" cy="81" r="2" class="dot" opacity="0.5"/>
  <circle cx="44" cy="74" r="2" class="dot" opacity="0.5"/>
  <circle cx="55" cy="20" r="2" class="dot" opacity="0.5"/>
  <circle cx="72" cy="13" r="2" class="dot" opacity="0.5"/>
  <circle cx="84" cy="12" r="2" class="dot" opacity="0.5"/>

  <!-- M: Two 2-link robot arms forming M shape -->

  <!-- Left base platform -->
  <rect x="100" y="84" width="16" height="8" rx="2" fill="#8C1515"/>
  <!-- Left shoulder joint (hollow) -->
  <circle cx="108" cy="84" r="5" fill="#FDF6F4" stroke="#8C1515" stroke-width="2.5"/>
  <circle cx="108" cy="84" r="1.5" class="dot"/>
  <!-- Left upper link (thick tapered arm) -->
  <polygon points="105,82 111,82 123,20 117,20" fill="#8C1515" opacity="0.85"/>
  <!-- Left elbow joint (hollow) -->
  <circle cx="120" cy="18" r="5.5" fill="#FDF6F4" stroke="#8C1515" stroke-width="2.5"/>
  <circle cx="120" cy="18" r="1.5" class="dot"/>
  <!-- Left forearm (tapered) -->
  <polygon points="117,20 123,20 151,68 145,68" fill="#8C1515" opacity="0.85"/>
  <!-- Left wrist joint -->
  <circle cx="148" cy="68" r="4" fill="#FDF6F4" stroke="#8C1515" stroke-width="2"/>
  <circle cx="148" cy="68" r="1.2" class="dot"/>
  <!-- Left gripper finger -->
  <path d="M 146,72 L 142,82 L 145,82" fill="#8C1515"/>

  <!-- Right base platform -->
  <rect x="180" y="84" width="16" height="8" rx="2" fill="#8C1515"/>
  <!-- Right shoulder joint (hollow) -->
  <circle cx="188" cy="84" r="5" fill="#FDF6F4" stroke="#8C1515" stroke-width="2.5"/>
  <circle cx="188" cy="84" r="1.5" class="dot"/>
  <!-- Right upper link (thick tapered arm) -->
  <polygon points="185,82 191,82 179,20 173,20" fill="#8C1515" opacity="0.85"/>
  <!-- Right elbow joint (hollow) -->
  <circle cx="176" cy="18" r="5.5" fill="#FDF6F4" stroke="#8C1515" stroke-width="2.5"/>
  <circle cx="176" cy="18" r="1.5" class="dot"/>
  <!-- Right forearm (tapered) -->
  <polygon points="179,20 173,20 145,68 151,68" fill="#8C1515" opacity="0.85"/>
  <!-- Right wrist joint -->
  <circle cx="148" cy="68" r="4" fill="#FDF6F4" stroke="#8C1515" stroke-width="2"/>
  <!-- Right gripper finger -->
  <path d="M 150,72 L 154,82 L 151,82" fill="#8C1515"/>

  <!-- Small object being held -->
  <rect x="144" y="82" width="8" height="6" rx="1.5" fill="none" stroke="#8C1515" stroke-width="1.5"/>

  <!-- L: Exact LaTeX \mathcal{L} glyph from cmsy10 + curly braces -->
  <!-- Outer transform positions and scales the 28x28 glyph into the logo -->
  <g transform="translate(188,6) scale(3.1)">
    <!-- Inner transform is the original LaTeX matrix -->
    <g transform="matrix(1.3333333,0,0,1.3333333,2.6573333,25.24)">
      <path d="M 4.4640313,-2.3098828 C 5.7999688,-4.3841016 6.2218438,-5.9778516 6.53825,-7.2903516 7.4054375,-10.712227 8.3546563,-13.67707 9.8898125,-15.388008 c 0.2929685,-0.328125 0.4921875,-0.550781 1.2890625,-0.550781 1.710938,0 1.757813,1.710937 1.757813,2.0625 0,0.445312 -0.128907,0.785156 -0.128907,0.914062 0,0.175782 0.152344,0.175782 0.175782,0.175782 0.398437,0 1.066406,-0.28125 1.6875,-0.726563 0.445312,-0.339844 0.667968,-0.585937 0.667968,-1.605469 0,-1.335937 -0.691406,-2.355468 -2.074218,-2.355468 -0.796875,0 -2.976563,0.199218 -5.414063,2.648437 -1.9804687,2.039063 -3.140625,6.4921877 -3.609375,8.3554689 -0.4453125,1.7109375 -0.6445312,2.4726563 -1.3945312,3.9609375 -0.1757813,0.3046875 -0.8203125,1.3945313 -1.1601563,1.71093754 -0.6679687,0.62109375 -0.9140625,1.06640625 -0.9140625,1.1953125 0,0.046875 0.046875,0.15234375 0.22265625,0.15234375 0.0937502,0 0.60937505,-0.10546875 1.25390625,-0.52734375 0.421875,-0.24609375 0.4804688,-0.29296875 1.0429688,-0.890625 1.2421875,0.0234375 2.109375,0.24609375 3.6679687,0.69140625 1.265625,0.3515625 2.53125,0.7265625 3.796875,0.7265625 2.003906,0 4.042969,-1.51171875 4.828125,-2.61328129 0.503906,-0.6679687 0.644531,-1.2890625 0.644531,-1.359375 0,-0.1757812 -0.140625,-0.1757812 -0.164062,-0.1757812 -0.398438,0 -0.996094,0.28125 -1.417969,0.5742187 -0.667969,0.421875 -0.714844,0.5742188 -0.867187,0.9960938 -0.128907,0.3867187 -0.269532,0.5859375 -0.375,0.7382812 -0.199219,0.29296879 -0.222657,0.29296879 -0.597657,0.29296879 -1.183593,0 -2.425781,-0.36328129 -4.0546872,-0.80859379 -0.703125,-0.1992187 -2.0625,-0.5976562 -3.3046875,-0.5976562 -0.3164063,0 -0.6679688,0.023437 -0.984375,0.09375 z"
        fill="#8C1515" fill-rule="nonzero" stroke="none"/>
    </g>
  </g>
  <!-- Left curly brace { -->
  <path d="M 276,14 C 272,14 270,17 270,22 L 270,42 C 270,45 268,48 265,50 C 268,52 270,55 270,58 L 270,78 C 270,83 272,86 276,86" class="stroke" stroke-width="2.5" fill="none"/>
  <!-- Right curly brace } -->
  <path d="M 300,14 C 304,14 306,17 306,22 L 306,42 C 306,45 308,48 311,50 C 308,52 306,55 306,58 L 306,78 C 306,83 304,86 300,86" class="stroke" stroke-width="2.5" fill="none"/>
  <!-- Centered dot (·) inside braces -->
  <circle cx="288" cy="50" r="3" class="dot"/>
</svg>
