<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .stroke { fill: none; stroke: #8C1515; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #8C1515; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #8C1515; }
    </style>
  </defs>

  <!-- S: Hill function sigmoid (top-left) -->
  <line x1="5" y1="45" x2="45" y2="45" class="thin" opacity="0.25"/>
  <line x1="5" y1="45" x2="5" y2="5" class="thin" opacity="0.25"/>
  <path d="M 8,42 C 12,42 17,42 21,41 C 24,40 25,36 26,28 C 27,20 28,16 30,14 C 33,11 37,10 43,10" class="stroke" stroke-width="3"/>
  <circle cx="11" cy="41.5" r="1.3" class="dot" opacity="0.5"/>
  <circle cx="18" cy="41" r="1.3" class="dot" opacity="0.5"/>
  <circle cx="24" cy="38" r="1.3" class="dot" opacity="0.5"/>
  <circle cx="30" cy="15" r="1.3" class="dot" opacity="0.5"/>
  <circle cx="38" cy="11" r="1.3" class="dot" opacity="0.5"/>

  <!-- M: Robot arms (top-right) -->
  <!-- Left base -->
  <rect x="52" y="43" width="9" height="4" rx="1" fill="#8C1515"/>
  <circle cx="56.5" cy="43" r="3" fill="white" stroke="#8C1515" stroke-width="1.8"/>
  <circle cx="56.5" cy="43" r="0.8" class="dot"/>
  <!-- Left upper link -->
  <polygon points="55,42 58,42 63,12 60,12" fill="#8C1515" opacity="0.85"/>
  <!-- Left elbow -->
  <circle cx="61.5" cy="11" r="3.2" fill="white" stroke="#8C1515" stroke-width="1.8"/>
  <circle cx="61.5" cy="11" r="0.8" class="dot"/>
  <!-- Left forearm -->
  <polygon points="60,12 63,12 76.5,36 73.5,36" fill="#8C1515" opacity="0.85"/>
  <!-- Left wrist -->
  <circle cx="75" cy="36" r="2.5" fill="white" stroke="#8C1515" stroke-width="1.5"/>
  <!-- Left gripper -->
  <path d="M 74,38 L 72,43 L 73.5,43" fill="#8C1515"/>

  <!-- Right base -->
  <rect x="89" y="43" width="9" height="4" rx="1" fill="#8C1515"/>
  <circle cx="93.5" cy="43" r="3" fill="white" stroke="#8C1515" stroke-width="1.8"/>
  <circle cx="93.5" cy="43" r="0.8" class="dot"/>
  <!-- Right upper link -->
  <polygon points="92,42 95,42 90,12 87,12" fill="#8C1515" opacity="0.85"/>
  <!-- Right elbow -->
  <circle cx="88.5" cy="11" r="3.2" fill="white" stroke="#8C1515" stroke-width="1.8"/>
  <circle cx="88.5" cy="11" r="0.8" class="dot"/>
  <!-- Right forearm -->
  <polygon points="90,12 87,12 73.5,36 76.5,36" fill="#8C1515" opacity="0.85"/>
  <!-- Right wrist (shared) -->
  <circle cx="75" cy="36" r="2.5" fill="white" stroke="#8C1515" stroke-width="1.5"/>
  <!-- Right gripper -->
  <path d="M 76,38 L 78,43 L 76.5,43" fill="#8C1515"/>
  <!-- Held object -->
  <rect x="73" y="43" width="4" height="3" rx="1" fill="none" stroke="#8C1515" stroke-width="1"/>

