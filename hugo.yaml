          Completed dual degrees (ME + Mathematics, Applied Science) in **three years** with **Provost Honors every quarter**. 258 quarter units total, consistently taking 24-28 units/quarter (7-8 courses vs. the standard 4-5). Near-straight A+ in core engineering and mathematics courses.

          Key coursework: Linear Control, Signals & Systems, Embedded Control & Robotics, Spacecraft Guidance, Intro to Autonomous Vehicles, ML Algorithms, Stochastic Processes, Numerical Analysis, Real Analysis, Probability.

  # Projects
  projects:
    enable: true
    items:
      - title: "SchedWall — Schedule Wallpaper App"
        content: |-
          Android app (Kotlin/Jetpack Compose) that turns weekly schedules into phone wallpapers. Features calendar sync, ICS import/export, AI photo scanning (Claude/GPT-4o/Gemini), customizable themes, background image overlay with crop/zoom/rotate, multi-day events, timezone support, and 7-language localization. Published on Google Play.
        image: /images/projects/schedwall.png
        badges:
          - "Kotlin"
          - "Jetpack Compose"
          - "Android"
          - "Canvas"
          - "WorkManager"
        links:
          - icon: fab fa-google-play
            url: https://play.google.com/store/apps/details?id=com.saimailau.schedulewall
          - icon: fas fa-book
            url: https://saimailau.com/schedwall/

      - title: "Cosmic Farm — Idle Clicker with an AI (MOMDP) Game Master"
        content: |-
          Web-based idle/clicker game where an AI game master observes your play style and adapts the experience in real-time using a MOMDP (Mixed Observability MDP) with Bayesian belief updates. Features Nova, an AI overseer character that comments on your behavior, a branching 4-chapter storyline with 3 endings, tech tree with 37 research upgrades, synergy and achievement systems, and 12 producer tiers scaling from wheat fields to cosmic nexuses.
        image: /images/projects/cosmic-farm.png
        badges:
          - "TypeScript"
          - "Vite"
          - "MOMDP"
          - "PWA"
          - "Game Dev"
        links:
          - icon: fab fa-github
            url: https://github.com/saimlau/cosmic-farm
          - icon: fas fa-globe
            url: https://clicker.saimailau.com

      - title: "Voice-Controlled Bimanual Pick-and-Place Robot"
        content: |-
          Full-stack ROS 2 system for a bimanual mobile manipulator with voice commands (GCP STT), SAM3 object tracking, AnyGrasp grasp detection, LLM-based autonomous reasoning (Claude AI commander), and 3-phase PID navigation. MuJoCo simulation with custom ArUco scenes.
        image: /images/projects/me326.png
        badges:
          - "ROS 2"
          - "Python"
          - "MuJoCo"
          - "SAM3"
          - "AnyGrasp"
          - "LLM"
        links:
